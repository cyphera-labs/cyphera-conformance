name: Conformance
on:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & Run
        run: |
          cd runners/python
          docker build -t cyphera-test-python .
          docker run --rm -v ${{ github.workspace }}:/vectors cyphera-test-python
      - uses: actions/upload-artifact@v7
        with:
          name: results-python
          path: results/python/

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & Run
        run: |
          cd runners/node
          docker build -t cyphera-test-node .
          docker run --rm -v ${{ github.workspace }}:/vectors cyphera-test-node
      - uses: actions/upload-artifact@v7
        with:
          name: results-node
          path: results/node/

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & Run
        run: |
          cd runners/java
          docker build -t cyphera-test-java .
          docker run --rm -v ${{ github.workspace }}:/vectors cyphera-test-java
      - uses: actions/upload-artifact@v7
        with:
          name: results-java
          path: results/java/

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & Run
        run: |
          cd runners/dotnet
          docker build -t cyphera-test-dotnet .
          docker run --rm -v ${{ github.workspace }}:/vectors cyphera-test-dotnet
      - uses: actions/upload-artifact@v7
        with:
          name: results-dotnet
          path: results/dotnet/

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & Run
        run: |
          cd runners/rust
          docker build -t cyphera-test-rust .
          docker run --rm -v ${{ github.workspace }}:/vectors cyphera-test-rust
      - uses: actions/upload-artifact@v7
        with:
          name: results-rust
          path: results/rust/

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & Run
        run: |
          cd runners/php
          docker build -t cyphera-test-php .
          docker run --rm -v ${{ github.workspace }}:/vectors cyphera-test-php
      - uses: actions/upload-artifact@v7
        with:
          name: results-php
          path: results/php/

  swift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build & Run
        run: |
          cd runners/swift
          docker build -t cyphera-test-swift .
          docker run --rm -v ${{ github.workspace }}:/vectors cyphera-test-swift
      - uses: actions/upload-artifact@v7
        with:
          name: results-swift
          path: results/swift/

  compare:
    needs: [python, node, java, dotnet, rust, php, swift]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: results/
          pattern: results-*
          merge-multiple: false

      - name: Compare results
        run: |
          # Restructure: results/results-{runner}/{cat}/{file} → flat
          mkdir -p flat
          for d in results/results-*/; do
            runner=$(basename "$d" | sed 's/results-//')
            if [ -d "$d" ]; then
              cp -r "$d" "flat/$runner"
            fi
          done

          python3 -c "
          import json, os, sys

          runners = ['java', 'rust', 'node', 'python', 'dotnet', 'php', 'swift']
          categories = ['engine', 'sdk']
          total = 0; match = 0; diffs = []

          for cat in categories:
              files = set()
              for r in runners:
                  d = f'flat/{r}/{cat}'
                  if os.path.isdir(d): files.update(os.listdir(d))
              for f in sorted(files):
                  results = {}
                  for r in runners:
                      p = f'flat/{r}/{cat}/{f}'
                      if os.path.exists(p):
                          results[r] = json.load(open(p)).get('results', [])
                  if len(results) < 2: continue
                  base = list(results.keys())[0]
                  for i, case in enumerate(results[base]):
                      total += 1
                      vals = {}
                      for r in results:
                          if i < len(results[r]):
                              c = results[r][i]
                              vals[r] = c.get('ciphertext') if cat == 'engine' else c.get('protected')
                      unique = set(str(v) for v in vals.values())
                      if len(unique) == 1: match += 1
                      else:
                          pt = case.get('plaintext', '?')[:40]
                          diffs.append(f'{cat}/{f} case {i} (pt={pt}): {vals}')

          print(f'=== Conformance: {match}/{total} unanimous ===')
          if diffs:
              print(f'\nDifferences ({len(diffs)}):')
              for d in diffs: print(f'  {d}')
              if len(diffs) > 5:
                  print(f'\nFAIL: {len(diffs)} non-unanimous cases')
                  sys.exit(1)
              else:
                  print(f'\nWARN: {len(diffs)} known differences (error handling alignment)')
          else:
              print('ALL CASES UNANIMOUS')
          "

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: conformance-results
          path: flat/
